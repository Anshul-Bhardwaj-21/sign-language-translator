# Sign Language Recognition Model Configuration
# This file defines the hyperparameters and settings for the CNN+LSTM baseline model

# Model Architecture
model:
  type: "CNN+LSTM"
  name: "sign_language_cnn_lstm_baseline"
  version: "1.0.0"
  
  # Input specifications
  input:
    sequence_length: 60  # Number of frames per sequence
    num_keypoints: 42    # 21 keypoints per hand × 2 hands
    coordinates: 3       # x, y, z coordinates
    input_features: 126  # 42 × 3 = 126
  
  # Output specifications
  output:
    num_classes: 50      # Number of gesture classes (20-50 for MVP)
    activation: "softmax"
  
  # CNN layers configuration
  cnn:
    layers:
      - filters: 64
        kernel_size: 3
        padding: 1
        activation: "relu"
        batch_norm: true
        max_pool: 2
        dropout: 0.3
      
      - filters: 128
        kernel_size: 3
        padding: 1
        activation: "relu"
        batch_norm: true
        max_pool: 2
        dropout: 0.3
      
      - filters: 256
        kernel_size: 3
        padding: 1
        activation: "relu"
        batch_norm: true
        global_max_pool: true
        dropout: 0.3
  
  # LSTM layers configuration
  lstm:
    layers:
      - units: 128
        return_sequences: true
        dropout: 0.4
      
      - units: 64
        return_sequences: false
        dropout: 0.4
  
  # Dense classification head
  dense:
    layers:
      - units: 128
        activation: "relu"
        dropout: 0.5
      
      - units: 50  # num_classes
        activation: "softmax"
        dropout: 0.0

# Training Configuration
training:
  # Optimizer settings
  optimizer:
    type: "Adam"
    learning_rate: 0.001
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.0
  
  # Loss function
  loss:
    type: "CrossEntropyLoss"
    label_smoothing: 0.0
  
  # Training parameters
  batch_size: 32
  epochs: 100
  
  # Early stopping
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
    monitor: "val_accuracy"
    mode: "max"
  
  # Learning rate scheduling
  lr_scheduler:
    enabled: false
    type: "ReduceLROnPlateau"
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6
  
  # Gradient clipping
  gradient_clipping:
    enabled: true
    max_norm: 1.0

# Data Configuration
data:
  # Dataset paths
  dataset_version: "v1.0.0"
  raw_path: "backend/storage/datasets/v1.0.0/raw"
  processed_path: "backend/storage/datasets/v1.0.0/processed"
  
  # Data splits
  splits:
    train: 0.70
    val: 0.15
    test: 0.15
  
  # Data augmentation (applied to training set only)
  augmentation:
    enabled: true
    horizontal_flip: true
    brightness_range: [-0.2, 0.2]
    rotation_range: [-10, 10]
    gaussian_noise_std: 0.01
  
  # Data loading
  num_workers: 4
  pin_memory: true
  shuffle_train: true
  shuffle_val: false
  shuffle_test: false

# Evaluation Configuration
evaluation:
  # Metrics to compute
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "confusion_matrix"
  
  # Per-class metrics
  per_class_metrics: true
  
  # Confusion matrix settings
  confusion_matrix:
    normalize: true
    save_plot: true
  
  # Performance requirements
  requirements:
    min_accuracy_mvp: 0.85    # Requirement 30.10
    min_accuracy_prod: 0.95   # Requirement 30.11
    max_inference_latency_ms: 200  # Requirement 33.4

# Model Registry Configuration
model_registry:
  # MLflow settings
  mlflow:
    tracking_uri: "http://localhost:5000"
    experiment_name: "sign-language-asl-baseline"
    artifact_location: "s3://ml-models/sign-language"
  
  # Model versioning
  versioning:
    semantic_versioning: true
    auto_increment: true
  
  # Deployment tags
  deployment_tags:
    - "experimental"
    - "staging"
    - "production"

# Inference Configuration
inference:
  # Device settings
  device: "auto"  # "cuda", "cpu", or "auto"
  
  # Batch inference
  batch_size: 1
  
  # Confidence filtering
  confidence_threshold: 0.7  # Requirement 33.7
  
  # Performance
  max_latency_ms: 200  # Requirement 33.4, 46.5

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Training logs
  log_interval: 10  # Log every N batches
  
  # Checkpoint saving
  checkpoint:
    save_best_only: true
    save_frequency: 1  # Save every N epochs
    max_checkpoints: 5  # Keep only last N checkpoints

# Hardware Configuration
hardware:
  # GPU settings
  gpu:
    enabled: true
    device_ids: [0]  # List of GPU device IDs to use
    mixed_precision: false  # Use automatic mixed precision (AMP)
  
  # CPU settings
  cpu:
    num_threads: 4

# Reproducibility
reproducibility:
  seed: 42
  deterministic: true
  benchmark: false

# Requirements Mapping
requirements:
  - id: "30.1"
    description: "Implements CNN+LSTM architecture for sequence classification"
    status: "implemented"
  
  - id: "30.10"
    description: "Achieves minimum 85% accuracy on test set for MVP release"
    status: "target"
    target_metric: "test_accuracy >= 0.85"
