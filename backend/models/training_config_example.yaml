# Example Training Configuration
# Copy this file and modify as needed for custom training runs

# Training Run Metadata
run_name: "sign_language_mvp_baseline"
description: "CNN+LSTM baseline model for 50 gesture classes - MVP release"
tags:
  - "mvp"
  - "baseline"
  - "cnn-lstm"

# Data Configuration
data:
  data_dir: "backend/storage/datasets/v1.0.0/processed"
  splits_dir: "backend/storage/datasets/v1.0.0/splits"
  num_classes: 50  # Auto-detected if not specified
  sequence_length: 60
  num_workers: 4

# Model Configuration
model:
  type: "CNN+LSTM"
  dropout_rate: 0.3

# Training Hyperparameters
training:
  # Optimizer (Requirement 30.5)
  learning_rate: 0.001  # Adam learning rate
  batch_size: 32
  epochs: 100
  
  # Early Stopping (Requirement 30.6)
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
    monitor: "val_accuracy"
  
  # Gradient Clipping
  gradient_clipping:
    enabled: true
    max_norm: 1.0

# Checkpoint Configuration
checkpoints:
  checkpoint_dir: "backend/models/checkpoints"
  save_best_only: true
  save_frequency: 1  # Save every N epochs (if not save_best_only)

# Hardware Configuration
hardware:
  device: "auto"  # "auto", "cuda", or "cpu"
  pin_memory: true

# Logging Configuration
logging:
  log_level: "INFO"
  log_file: "training.log"
  log_interval: 10  # Log every N batches

# Reproducibility
reproducibility:
  seed: 42
  deterministic: true

# Performance Requirements (for validation)
requirements:
  min_accuracy_mvp: 0.85  # Requirement 30.10
  max_inference_latency_ms: 200  # Requirement 33.4
