worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream signbridge_backend {
        server backend:8001;
    }

    upstream signbridge_frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        location /health {
            proxy_pass http://signbridge_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /rooms {
            proxy_pass http://signbridge_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /predict {
            proxy_pass http://signbridge_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /ws/ {
            proxy_pass http://signbridge_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://signbridge_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
